name: Deploy Svelte to cPanel via FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build the Svelte app
        run: npm run build

      - name: Deploy via FTP
        run: |
          FTP_HOST="${{ secrets.FTP_HOST }}"
          FTP_USER="${{ secrets.FTP_USERNAME }}"
          FTP_PASS="${{ secrets.FTP_PASSWORD }}"
          
          upload_file() {
            local_file="$1"
            remote_file="$2"
            curl -T "$local_file" --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/public_html/$remote_file"
          }
          
          upload_dir() {
            dir="$1"
            find "$dir" -type f | while read -r file; do
              relative_path="${file#$dir/}"
              echo "Uploading: $relative_path"
              curl -T "$file" --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/public_html/$relative_path"
            done
          }
          
          upload_dir "./build"
